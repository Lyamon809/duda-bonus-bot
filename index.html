<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Розыгрыш</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            margin-top: 50px;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Участие в розыгрыше</h1>
        <p id="description">Нажмите кнопку ниже, чтобы подтвердить свое участие.</p>

        <button id="joinBtn" class="btn">Участвовать</button>
        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // Получаем ID розыгрыша из URL
        const urlParams = new URLSearchParams(window.location.search);
        const gv_id = urlParams.get('gv_id');

        const joinBtn = document.getElementById('joinBtn');
        const statusMessage = document.getElementById('statusMessage');

        // ВАЖНО: Замените на реальный IP или домен вашего бота
        const API_URL = "https://dudaludo-app.ru/api/join";

        joinBtn.addEventListener('click', async () => {
            if (!gv_id) {
                statusMessage.innerText = "Ошибка: ID розыгрыша не найден.";
                return;
            }

            joinBtn.disabled = true;
            joinBtn.innerText = "Загрузка...";

            try {
                // Отправляем безопасные данные авторизации Telegram на наш бэкенд
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        initData: tg.initData,
                        gv_id: gv_id
                    })
                });

                const result = await response.json();

                if (result.success) {
                    tg.HapticFeedback.notificationOccurred('success');
                    statusMessage.innerText = "✅ Вы успешно зарегистрированы!";
                    joinBtn.style.display = 'none';

                    // Закрываем окно через 2 секунды
                    setTimeout(() => tg.close(), 2000);
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                    if (result.error === "not_subscribed") {
                        statusMessage.innerText = "❌ Вы не подписаны на обязательные каналы!";
                    } else if (result.error === "already_participating") {
                        statusMessage.innerText = "ℹ️ Вы уже участвуете в этом розыгрыше.";
                    } else {
                        statusMessage.innerText = "❌ Произошла ошибка. Попробуйте позже.";
                    }
                    joinBtn.disabled = false;
                    joinBtn.innerText = "Попробовать снова";
                }
            } catch (error) {
                tg.HapticFeedback.notificationOccurred('error');
                statusMessage.innerText = "❌ Ошибка соединения с сервером.";
                joinBtn.disabled = false;
                joinBtn.innerText = "Участвовать";
            }
        });
    </script>
</body>
</html>
